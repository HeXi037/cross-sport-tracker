name: CI

on:
  push:
  pull_request:

jobs:
  package-manager-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure pnpm-only lockfiles
        run: |
          if find . -name package-lock.json -not -path "*/node_modules/*" | grep -q .; then
            echo "package-lock.json detected. This repository is pnpm-only."
            find . -name package-lock.json -not -path "*/node_modules/*"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: DATABASE_URL=sqlite+aiosqlite:///./ci.db pytest -q

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install frontend dependencies
        run: pnpm install --filter @cst/web --frozen-lockfile
      - name: Run web lint
        run: pnpm --filter @cst/web lint
      - name: Run web tests
        env:
          CI: true
        run: pnpm test -- --runInBand --watch=false
